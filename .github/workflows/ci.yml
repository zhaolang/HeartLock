# ============================================
# HeartLock CI — Pull Request 自动检查
# ============================================

name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heartlock
          POSTGRES_PASSWORD: test
          POSTGRES_DB: heartlock_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum

      - name: Check formatting
        run: gofmt -l . && test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: heartlock
          DB_PASSWORD: test
          DB_NAME: heartlock_test
          DB_SSLMODE: disable
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o heartlock-server ./cmd/server

      - name: Docker build
        run: docker build -t heartlock:ci -f Dockerfile .
