
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/zhaolang/heartlock:${VERSION:-latest}
    container_name: heartlock-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    container_name: heartlock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-heartlock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-heartlock_dev}
      POSTGRES_DB: ${DB_NAME:-heartlock}
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-heartlock} -d ${DB_NAME:-heartlock}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres_data:
    driver: local
