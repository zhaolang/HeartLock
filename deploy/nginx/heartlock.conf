# ============================================
# HeartLock Nginx 反向代理配置
# ============================================
# 部署路径: /opt/heartlock/nginx/heartlock.conf
# 软链到 sites-enabled:
#   sudo ln -sf /opt/heartlock/nginx/heartlock.conf /etc/nginx/sites-enabled/
# ============================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name heartlock.app api.heartlock.app;
    return 301 https://$host$request_uri;
}

# API 反向代理
server {
    listen 443 ssl http2;
    server_name api.heartlock.app;

    ssl_certificate     /etc/letsencrypt/live/api.heartlock.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.heartlock.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 客户端请求体大小限制（心锁内容最大 500 字，足够）
    client_max_body_size 10k;

    # Gzip 压缩
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # 访问日志（可选）
    access_log /var/log/nginx/heartlock-access.log;
    error_log  /var/log/nginx/heartlock-error.log;
}

# 管理后台（与 API 共用同一域名下的 /admin 路径，此段为可选的独立域名方案）
# 如分开域名，取消下面注释；建议简单部署共用 api 域名的 /admin 即可
# server {
#     listen 443 ssl http2;
#     server_name admin.heartlock.app;
#     ...
# }
